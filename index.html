<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars RP Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;600;700&family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <!-- Background video/image placeholder -->
    <div class="bg-overlay"></div>
    <div class="background">
        <!-- You can replace this with a hyperdrive GIF or Star Wars wallpaper if you prefer static -->
        <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1920&auto=format&fit=crop" alt="Space Background">
    </div>

    <div class="container">
        <!-- Server Header -->
        <header class="server-header">
            <h1 class="glow-text">JINX IMPERIAL OCCUPATION RP</h1>
            <p class="subtitle">ENTERING SPACE PORT</p>
        </header>

        <!-- Loading Information -->
        <main class="loading-wrapper">
            <div class="info-box">
                <div class="map-info">
                    <span class="label">CURRENT DEPLOYMENT:</span>
                    <span id="mapname" class="value glow-text-blue">Retrieving coordinates...</span>
                </div>
                <!-- You can add rules or lore here -->
                <div class="lore-box">
                    <ul>
                        <li><span class="bullet">►</span> Respect the chain of command.</li>
                        <li><span class="bullet">►</span> Fail RP is strictly prohibited.</li>
                        <li><span class="bullet">►</span> Voice comms are mandatory during events.</li>
                        <li><span class="bullet">►</span> Join our Discord for updates and promotions.</li>
                    </ul>
                </div>
            </div>

            <!-- Actually functional Progress Bar -->
            <div class="progress-container">
                <div class="status-text-row">
                    <span id="status-text">Awaiting Initialization...</span>
                    <span id="percentage">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar-fill"></div>
                </div>
            </div>
        </main>
    </div>
